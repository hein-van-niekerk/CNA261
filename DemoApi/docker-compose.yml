version: "3.9"
services:
  demoapi:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Default=Host=db;Port=5432;Database=demodb;Username=postgres;Password=postgres
    depends_on:
       db:
         condition: service_healthy
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=demodb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demodb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
volumes:
  pgdata: